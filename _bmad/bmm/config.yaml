# PRD Preferences
prd_functional_requirements_format: gherkin  # Options: table, gherkin
prd_gherkin_notes: |
  Préférence utilisateur: Les Functional Requirements doivent être rédigés en format Gherkin (BDD).
  Avantages: clarté, testabilité automatisée, langage commun PM/Dev/QA.
  Structure: Feature > Background > Scenario/Scenario Outline > Given/When/Then
  Inclure les Examples pour les cas limites et combinaisons.

# Epics & Stories Preferences
